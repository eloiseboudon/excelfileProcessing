name: Security Scan

on:
  schedule:
    - cron: '17 6 * * 1' # Lundi 8h17 Paris (UTC+2)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: NPM audit (frontend)
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          echo "## 📦 NPM Audit — frontend" >> "$GITHUB_STEP_SUMMARY"
          if npm audit --omit=dev 2>&1 | tee /tmp/npm-audit.txt; then
            echo "✅ No known vulnerabilities" >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/npm-audit.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Pip audit (backend)
        working-directory: backend
        run: |
          pip install pip-audit
          echo "## 🐍 Pip Audit — backend" >> "$GITHUB_STEP_SUMMARY"
          if pip-audit -r requirements.txt 2>&1 | tee /tmp/pip-audit.txt; then
            echo "✅ No known vulnerabilities" >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/pip-audit.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  code-patterns:
    name: Dangerous Patterns
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Scan for dangerous patterns
        run: |
          echo "## 🔍 Code Pattern Scan" >> "$GITHUB_STEP_SUMMARY"
          FOUND=0

          # Patterns dangereux avec contexte
          declare -A PATTERNS
          PATTERNS=(
            ["eval("]="eval() — risque d'injection"
            ["exec("]="exec() — risque d'injection"
            ["dangerouslySetInnerHTML"]="dangerouslySetInnerHTML — risque XSS"
            ["innerHTML"]="innerHTML — risque XSS"
            ["subprocess.call.*shell=True"]="shell=True — risque command injection"
            ["os.system("]="os.system() — risque command injection"
          )

          for pattern in "${!PATTERNS[@]}"; do
            desc="${PATTERNS[$pattern]}"
            MATCHES=$(grep -rn --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" "$pattern" --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=dist --exclude-dir=build . 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FOUND=$((FOUND + 1))
              echo "### ⚠️ $desc" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "$MATCHES" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          # Secrets potentiels (clés API, tokens hardcodés)
          SECRET_MATCHES=$(grep -rn --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" -iE "(api_key|api[-_]?secret|password|token)\s*=\s*[\"'][^\"']{8,}" --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=dist --exclude-dir=build --exclude="*.test.*" --exclude="*.spec.*" . 2>/dev/null | grep -v "process\.env\|os\.environ\|os\.getenv\|import\.meta\.env\|\.example" || true)
          if [ -n "$SECRET_MATCHES" ]; then
            FOUND=$((FOUND + 1))
            echo "### 🔑 Secrets potentiels hardcodés" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$SECRET_MATCHES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # SQL par concaténation
          SQL_MATCHES=$(grep -rn --include="*.py" -E "(execute|cursor)\(.*[\"'].*(%s|{|\+).*[\"']" --exclude-dir=.venv . 2>/dev/null | grep -v "parameterized\|placeholder" || true)
          if [ -n "$SQL_MATCHES" ]; then
            FOUND=$((FOUND + 1))
            echo "### 💉 SQL construit par concaténation" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$SQL_MATCHES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # .env versionné
          ENV_FILES=$(git ls-files | grep -E "^\.env$|^\.env\.local$|^\.env\.production$" || true)
          if [ -n "$ENV_FILES" ]; then
            FOUND=$((FOUND + 1))
            echo "### 🚨 Fichiers .env versionnés" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$ENV_FILES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "✅ Aucun pattern dangereux détecté" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "**$FOUND catégorie(s) à vérifier**" >> "$GITHUB_STEP_SUMMARY"
          fi
