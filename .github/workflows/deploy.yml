name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: ODOO_ENCRYPTION_KEY,ANTHROPIC_API_KEY,CATALOGUE_UPLOAD_TOKEN
          script: bash /home/ubuntu/ajtpro/deploy-ci.sh
        env:
          ODOO_ENCRYPTION_KEY: ${{ secrets.ODOO_ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CATALOGUE_UPLOAD_TOKEN: ${{ secrets.CATALOGUE_UPLOAD_TOKEN }}
